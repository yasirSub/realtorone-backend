name: Deploy Backend to Hostinger (VPS)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 187.77.184.129
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          # password: ${{ secrets.VPS_PASSWORD }} # Use SSH Key for better security
          command_timeout: 30m
          script: |
            set -e
            echo "--- Disk Before Cleanup ---"
            df -h
            mkdir -p /root/realtorone/backend
            cd /root/realtorone/backend
            # Use HTTPS for cloning if SSH key audit is an issue, or ensure SSH keys are correctly set on the VPS
            if [ ! -d .git ]; then
              git clone https://github.com/yasirSub/realtorone-backend.git .
            else
              git fetch origin main
              git reset --hard origin/main
            fi
            docker compose down --remove-orphans
            
            # Setup environment file if not exists
            if [ ! -f .env ]; then
              cp .env.example .env || touch .env
            fi

            # Aggressive Docker cleanup to reclaim disk on small VPS volumes.
            docker system prune -a --volumes -f
            docker builder prune -a -f
            # Keep system logs short to avoid root volume growth.
            journalctl --vacuum-time=2d || true
            apt-get clean || true
            docker compose up -d --build --force-recreate
            
            # Import database dump
            echo "--- Importing Database ---"
            if [ -f "realtorone (4).sql" ]; then
              # Wait for MySQL to be ready inside the container
              docker exec backend-mysql-1 mysqladmin ping -h 127.0.0.1 -uroot -ppassword --silent --wait=30
              docker exec -i backend-mysql-1 mysql -h 127.0.0.1 -uroot -ppassword realtorone < "realtorone (4).sql"
              echo "Database import completed."
            else
              echo "Database dump not found, skipping import."
            fi

            # Ensure the services are actually running
            docker compose ps
            echo "--- Disk After Cleanup ---"
            df -h
