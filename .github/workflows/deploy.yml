name: Deploy Backend to Hostinger (VPS)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 187.77.184.129
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          # password: ${{ secrets.VPS_PASSWORD }} # Use SSH Key for better security
          command_timeout: 30m
          script: |
            mkdir -p /root/realtorone/backend
            cd /root/realtorone/backend
            # Use HTTPS for cloning if SSH key audit is an issue, or ensure SSH keys are correctly set on the VPS
            if [ ! -d .git ]; then
              git clone https://github.com/yasirSub/realtorone-backend.git .
            else
              git fetch origin main
              git reset --hard origin/main
            fi
            docker compose down --remove-orphans
            docker compose up -d --build --force-recreate
