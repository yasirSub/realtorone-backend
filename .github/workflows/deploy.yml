name: Deploy Backend to Hostinger (VPS)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 187.77.184.129
          port: 22
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 120s
          command_timeout: 45m
          script: |
            set -e
            echo "--- Disk Before Cleanup ---"
            df -h
            mkdir -p /root/realtorone/backend
            cd /root/realtorone/backend
            # Use HTTPS for cloning if SSH key audit is an issue, or ensure SSH keys are correctly set on the VPS
            if [ ! -d .git ]; then
              git clone https://github.com/yasirSub/realtorone-backend.git .
            else
              git fetch origin main
              git reset --hard origin/main
            fi
            
            # Setup environment file if not exists
            if [ ! -f .env ]; then
              cp .env.example .env || touch .env
            fi

            # docker system prune -a --volumes -f  <-- REMOVED aggressive deletion
            # docker builder prune -a -f            <-- REMOVED aggressive deletion
            
            # Smart update: only rebuild if files changed
            # --remove-orphans ensures old containers are cleaned up without deleting everything
            docker compose up -d --build --remove-orphans

            # Fail fast with actionable logs if app container cannot start
            if ! docker ps --format '{{.Names}}' | grep -q '^backend-app-1$'; then
              echo "backend-app-1 is not running after compose up. Recent logs:"
              docker compose logs --tail=80 app || true
              exit 1
            fi
            
            # Use a robust wait loop that survives container restarts
            echo "Waiting for services to reach running and healthy state..."
            for i in {1..20}; do
              MYSQL_STATUS=$(docker inspect -f '{{.State.Status}}' backend-mysql-1 2>/dev/null || echo "not_found")
              APP_STATUS=$(docker inspect -f '{{.State.Status}}' backend-app-1 2>/dev/null || echo "not_found")
              
              # Also check actual health status if available
              MYSQL_HEALTH=$(docker inspect -f '{{.State.Health.Status}}' backend-mysql-1 2>/dev/null || echo "none")
              
              echo "MySQL Status: $MYSQL_STATUS ($MYSQL_HEALTH) | App Status: $APP_STATUS (Attempt $i/20)"
              
              if [ "$MYSQL_STATUS" == "running" ] && ([ "$MYSQL_HEALTH" == "healthy" ] || [ "$MYSQL_HEALTH" == "none" ]) && [ "$APP_STATUS" == "running" ]; then
                # Additional verification: Try to reach MySQL IP from within the App container
                # This bypasses any DNS issues during the startup phase
                if docker exec backend-app-1 mysqladmin ping -h 172.20.0.11 -uroot -ppassword --silent; then
                  echo "Services and Network are ready!"
                  sleep 3
                  break
                fi
              fi
              sleep 5
            done
            
            # Run migrations using the static IP configured in DB_HOST
            echo "--- Updating Content (Migrations) ---"
            docker exec backend-app-1 php artisan migrate --force || (echo "Migration failed, checking logs..." && docker logs backend-app-1 --tail 20 && exit 1)
            docker exec backend-app-1 php artisan db:seed --force
            echo "Update completed."

            # Ensure the services are actually running
            docker compose ps
            docker ps --filter name=backend-app-1 --filter name=backend-mysql-1
            echo "--- Disk After Cleanup ---"
            df -h
