name: Deploy Backend to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 187.77.184.129
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /root/realtorone/backend
            cd /root/realtorone/backend
            
            if [ ! -d .git ]; then
              git clone https://github.com/yasirSub/realtorone-backend.git .
            fi
            
            git pull origin main
            
            # Start Docker containers using your compose.yaml
            docker-compose up -d --build
