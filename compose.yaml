services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        restart: always
        ports:
            - '8000:8000'
        volumes:
            # Keep only PHP config mount; do NOT mount the whole app in production
            - ./php.ini:/usr/local/etc/php/php.ini:ro
        environment:
            APP_ENV: ${APP_ENV:-production}
            # IMPORTANT: set this in your VPS stack env (keep stable across restarts)
            APP_KEY: ${APP_KEY:-base64:k7rgmQg7V8UNLfXOQd0CimcjJQWCW5ODov2KzdLSgoA=}
            APP_DEBUG: ${APP_DEBUG:-false}
            # IMPORTANT: override this on the VPS with the real public backend URL.
            # Course uploads no longer depend on APP_URL for media playback, but other
            # generated links in Laravel still may.
            APP_URL: ${APP_URL:-http://localhost:8000}
            WAIT_FOR_DB: ${WAIT_FOR_DB:-1}
            RUN_MIGRATIONS: ${RUN_MIGRATIONS:-1}
            RUN_SEED: ${RUN_SEED:-1}
            DB_CONNECTION: mysql
            DB_HOST: mysql
            DB_PORT: 3306
            DB_DATABASE: realtorone
            DB_USERNAME: sail
            DB_PASSWORD: password
        depends_on:
            - mysql

    mysql:
        image: 'mysql:8.4'
        restart: always
        ports:
            - '3306:3306'
        environment:
            MYSQL_ROOT_PASSWORD: password
            MYSQL_DATABASE: realtorone
            MYSQL_USER: sail
            MYSQL_PASSWORD: password
        volumes:
            - 'mysql-data:/var/lib/mysql'
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
            interval: 5s
            timeout: 3s
            retries: 30

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        restart: always
        ports:
            - '8080:80'
        environment:
            PMA_HOST: mysql
            PMA_PORT: 3306
            PMA_USER: sail
            PMA_PASSWORD: password
            MYSQL_ROOT_PASSWORD: password
        depends_on:
            - mysql

volumes:
    mysql-data:
        driver: local
