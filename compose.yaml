services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        restart: always
        command: >
            bash -c "php artisan migrate --force &&
            php artisan serve --host=0.0.0.0 --port=8000"
        ports:
            - '8000:8000'
        volumes:
            - '.:/var/www/html'
        environment:
            APP_ENV: production
            APP_DEBUG: 'false'
            APP_URL: http://187.77.104.129
            DB_CONNECTION: mysql
            DB_HOST: mysql
            DB_PORT: 3306
            DB_DATABASE: realtorone
            DB_USERNAME: sail
            DB_PASSWORD: password
        depends_on:
            - mysql
    mysql:
        image: 'mysql:8.4'
        restart: always
        ports:
            - '3306:3306'
        environment:
            MYSQL_ROOT_PASSWORD: password
            MYSQL_DATABASE: realtorone
            MYSQL_USER: sail
            MYSQL_PASSWORD: password
        volumes:
            - 'mysql-data:/var/lib/mysql'
    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        restart: always
        ports:
            - '8080:80'
        environment:
            PMA_HOST: mysql
            PMA_PORT: 3306
            PMA_USER: sail
            PMA_PASSWORD: password
            MYSQL_ROOT_PASSWORD: password
        depends_on:
            - mysql
volumes:
    mysql-data:
        driver: local
